name: Playwright SauceDemo Integration Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  automation-run:
    runs-on: ubuntu-latest 

    steps:
      - name: 1. Extract Project Workspace
        uses: actions/checkout@v4

      - name: 2. Initialize Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: 3. Install Framework Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest playwright pytest-html

      - name: 4. Download Playwright Core Browsers
        run: python -m playwright install chromium

      - name: 5. Execute Automated Test Suite
        run: python -m pytest tests/testsaucedemo.py -v --html=report.html

      - name: 6. Archive Visual Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-execution-report
          path: report.html