name: Playwright SauceDemo Integration Suite

# ⚡ This block tells GitHub to run your tests AUTOMATICALLY on every push or PR to main!
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  automation-run:
    runs-on: ubuntu-latest # GitHub spins up a clean Linux cloud server for free

    steps:
      - name: 1. Extract Project Workspace
        uses: actions/checkout@v4

      - name: 2. Initialize Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Locks down a stable Python execution context

      - name: 3. Install Framework Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest playwright

      - name: 4. Download Playwright Core Browsers
        run: python -m playwright install chromium

      - name: 5. Execute Automated Test Suite
        run: python -m pytest tests/testsaucedemo.py